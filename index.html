<style>
  :root {
    --coral: #FF6B4A;
    --coral-text: #E5532F;
    --coral-light: #FFE3D4;
    --gray-text: #8A8A86;
    --gray-light: #F2F1EF;
    --green: #4CAF50;
    --amber: #F5A623;
    --dark-text: #2C2C2A;
    --border-radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ECEAE7;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    color: var(--dark-text);
  }
  #phone-wrap {
    width: 100%; max-width: 420px; background: #fff;
    min-height: 100vh; display: flex; flex-direction: column;
    position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }
  #app { flex: 1; display: flex; flex-direction: column; }
  .screen { display: flex; flex-direction: column; min-height: 100vh; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .topbar { display:flex; align-items:center; gap:12px; padding:14px 16px; border-bottom:1px solid var(--gray-light); }
  .back-btn { background:var(--gray-light); border:none; width:34px; height:34px; border-radius:50%; font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .back-btn:disabled { opacity:0.3; cursor:default; }
  .logo { display:flex; align-items:center; gap:6px; font-weight:800; font-size:15px; flex-shrink:0; }
  .logo-mark { width:22px; height:22px; border-radius:6px; background:linear-gradient(135deg,var(--coral),var(--amber)); }
  .progress-track { display:flex; gap:0; flex:1; }
  .progress-bar { height:6px; border-radius:3px; background:var(--gray-light); overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); transition:width 0.3s ease; border-radius:3px; }

  .content { flex:1; display:flex; flex-direction:column; padding:24px 20px 100px; }
  .content.no-pad-bottom { padding-bottom:24px; }
  .q-title { font-size:24px; font-weight:800; line-height:1.3; margin-bottom:8px; }
  .q-subtitle { font-size:14px; color:var(--gray-text); margin-bottom:20px; line-height:1.5; }

  .footer-cta { position:sticky; bottom:0; background:linear-gradient(to top,#fff 70%,rgba(255,255,255,0)); padding:20px 20px 24px; }
  .btn-primary { width:100%; background:var(--coral); color:#fff; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:700; cursor:pointer; transition:opacity 0.2s,transform 0.1s; }
  .btn-primary:active { transform:scale(0.98); }
  .btn-primary:disabled { opacity:0.4; cursor:default; }
  .btn-secondary { width:100%; background:transparent; color:var(--dark-text); border:2px solid var(--gray-light); border-radius:14px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; }

  /* Hero */
  .hero-screen { flex:1; display:flex; flex-direction:column; background:#fff; }
  .hero-topbar { display:flex; align-items:center; gap:6px; padding:16px 20px 0; }
  .hero-topbar .logo-mark { width:26px; height:26px; border-radius:8px; background:linear-gradient(135deg,var(--coral),var(--amber)); }
  .hero-topbar .logo-text { font-size:18px; font-weight:800; color:var(--coral-text); font-style:italic; letter-spacing:-0.5px; }

  /* Gender */
  .gender-row { display:flex; gap:12px; margin-bottom:24px; }
  .gender-card { flex:1; border:2px solid var(--gray-light); border-radius:var(--border-radius); padding:24px 12px; text-align:center; cursor:pointer; transition:all 0.15s; }
  .gender-card.selected { border-color:var(--coral); background:var(--coral-light); }
  .gender-avatar { font-size:40px; margin-bottom:10px; }
  .gender-label { font-weight:700; font-size:14px; }
  .legal-text { font-size:11px; color:var(--gray-text); line-height:1.6; margin-top:auto; }
  .legal-text a { color:var(--coral-text); text-decoration:underline; }

  .stat-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
  .stat-image { font-size:64px; margin-bottom:16px; }
  .stat-number { font-size:48px; font-weight:800; color:var(--coral-text); margin-bottom:8px; }
  .stat-label { font-size:15px; color:var(--gray-text); line-height:1.6; max-width:280px; }

  .options { display:flex; flex-direction:column; gap:10px; }
  .option { border:2px solid var(--gray-light); border-radius:14px; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:15px; font-weight:600; transition:all 0.15s; }
  .option.selected { border-color:var(--coral); background:var(--coral-light); color:var(--coral-text); }
  .opt-icon { font-size:20px; }
  .skip-link { text-align:center; color:var(--gray-text); font-size:14px; font-weight:600; margin-top:16px; cursor:pointer; text-decoration:underline; }

  .reframe-image { font-size:64px; text-align:center; margin:20px 0; }
  .reframe-card { background:var(--coral-light); border-radius:var(--border-radius); padding:22px; }
  .reframe-card h2 { font-size:20px; font-weight:800; margin-bottom:10px; color:#4A1B0C; }
  .reframe-card p { font-size:14px; color:#4A1B0C; line-height:1.6; margin-bottom:14px; }
  .chart-card { background:#fff; border-radius:12px; padding:12px; }
  .chart-svg-wrap { width:100%; height:110px; }

  .unit-toggle { display:flex; gap:8px; margin-bottom:24px; }
  .unit-btn { flex:1; border:2px solid var(--gray-light); background:#fff; border-radius:10px; padding:10px; font-weight:700; font-size:14px; cursor:pointer; color:var(--gray-text); }
  .unit-btn.active { border-color:var(--coral); color:var(--coral-text); background:var(--coral-light); }
  .numeric-display { flex:1; display:flex; align-items:center; justify-content:center; }
  .numeric-value-row { display:flex; align-items:center; gap:16px; }
  .numeric-stepper { display:flex; flex-direction:column; gap:8px; }
  .step-btn { width:40px; height:40px; border-radius:50%; border:2px solid var(--gray-light); background:#fff; font-size:20px; font-weight:700; cursor:pointer; color:var(--coral-text); }
  .numeric-value { font-size:56px; font-weight:800; min-width:100px; text-align:center; border:none; background:transparent; font-family:inherit; color:inherit; }
  .numeric-value:focus { outline:none; border-bottom:3px solid var(--coral); }
  .numeric-unit { font-size:18px; color:var(--gray-text); font-weight:700; }

  .feedback-card { border-radius:12px; padding:14px 16px; font-size:13px; line-height:1.6; margin-top:16px; }
  .feedback-card strong { display:block; margin-bottom:4px; font-size:14px; }
  .feedback-card.warning { background:#FFF4E5; color:#8A5A00; }
  .feedback-card.ai { background:#EFE9FF; color:#4A2E8A; display:flex; gap:8px; align-items:center; }
  .feedback-card.ai strong { margin-bottom:0; }
  .feedback-card.neutral { background:var(--gray-light); color:var(--dark-text); }
  .ai-icon { font-size:18px; }

  .text-input { width:100%; border:2px solid var(--gray-light); border-radius:12px; padding:14px 16px; font-size:15px; font-family:inherit; margin-bottom:8px; }
  .text-input:focus { outline:none; border-color:var(--coral); }
  .input-icon-wrap { position:relative; margin-bottom:8px; }
  .input-icon-wrap .icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; }
  .input-icon-wrap .text-input { padding-left:42px; margin-bottom:0; }

  .bmi-card { background:var(--gray-light); border-radius:var(--border-radius); padding:18px; margin-bottom:16px; }
  .bmi-row { display:flex; justify-content:space-between; font-size:13px; color:var(--gray-text); margin-bottom:10px; font-weight:600; }
  .bmi-badge { font-size:22px; font-weight:800; color:var(--coral-text); margin-bottom:12px; }
  .bmi-slider { height:8px; border-radius:4px; background:linear-gradient(to right,#4CAF50 0%,#4CAF50 35%,var(--amber) 35%,var(--amber) 65%,#E5533F 65%,#E5533F 100%); position:relative; margin-bottom:8px; }
  .bmi-marker { position:absolute; top:-4px; width:16px; height:16px; border-radius:50%; background:#fff; border:3px solid var(--dark-text); transform:translateX(-50%); }
  .bmi-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--gray-text); font-weight:600; }
  .data-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
  .data-table td { padding:10px 0; border-bottom:1px solid var(--gray-light); font-size:14px; }
  .data-table td:first-child { color:var(--gray-text); font-weight:600; }
  .data-table td:last-child { text-align:right; font-weight:700; }

  .badge { flex:1; text-align:center; background:var(--gray-light); border-radius:12px; padding:14px 6px; }
  .badge .number { font-size:20px; font-weight:800; color:var(--coral-text); }
  .badge .label { font-size:11px; color:var(--gray-text); font-weight:600; margin-top:4px; line-height:1.3; }
  .badge .stars { color:var(--amber); font-size:11px; margin-top:4px; }
  .testimonial-card { background:var(--gray-light); border-radius:14px; padding:16px; margin-top:12px; }
  .testimonial-stars { color:var(--amber); font-size:14px; margin-bottom:8px; }
  .testimonial-quote { font-size:13px; line-height:1.6; margin-bottom:8px; font-style:italic; }
  .testimonial-author-row { display:flex; align-items:center; gap:8px; }
  .testimonial-avatar { width:32px; height:32px; border-radius:50%; background:var(--coral-light); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .testimonial-name { font-size:12px; font-weight:700; color:var(--gray-text); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; padding:24px; z-index:100; }
  .modal-card { background:#fff; border-radius:var(--border-radius); padding:24px; width:100%; max-width:360px; }
  .modal-card h3 { font-size:18px; font-weight:800; margin-bottom:14px; text-align:center; }

  .optin-screen { flex:1; display:flex; flex-direction:column; justify-content:center; padding:40px 24px; }
  .optin-title { font-size:20px; font-weight:800; text-align:center; margin-bottom:28px; line-height:1.5; }

  .plan-bullets { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .plan-bullet { display:flex; align-items:center; gap:10px; font-size:14px; background:var(--gray-light); border-radius:10px; padding:12px 14px; }
  .plan-bullet.new { background:var(--coral-light); color:var(--coral-text); font-weight:700; }

  .challenge-title { font-size:22px; font-weight:800; margin-bottom:4px; }
  .challenge-sub { font-size:16px; font-weight:700; color:var(--coral-text); margin-bottom:12px; }

  .price-summary .label { color:var(--gray-text); font-weight:600; }
  .price-summary .value { font-weight:800; }
  .offer-banner { background:linear-gradient(135deg,var(--coral),var(--amber)); color:#fff; border-radius:12px; padding:12px 14px; font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .plan-card { border:2px solid var(--gray-light); border-radius:14px; padding:16px 16px 14px; display:flex; align-items:center; gap:12px; margin-bottom:18px; margin-top:22px; cursor:pointer; position:relative; }
  .plan-card.selected { border-color:var(--coral); background:var(--coral-light); }
  .plan-card.featured { border-color:var(--coral); }
  .plan-tag { position:absolute; top:-22px; left:-2px; right:-2px; background:var(--coral); color:#fff; font-size:11px; font-weight:800; padding:5px 0; border-radius:10px 10px 0 0; letter-spacing:0.5px; text-align:center; }
  .plan-tag.amber { background:var(--amber); }
  .plan-radio { width:22px; height:22px; border-radius:50%; border:2px solid var(--gray-text); flex-shrink:0; }

  .plan-price-new { text-align:right; }
  .plan-price-new .amount { font-size:26px; font-weight:800; color:var(--coral-text); }
  .plan-price-new .per-day { display:block; font-size:10px; color:var(--gray-text); font-weight:600; }
  .guarantee-text { text-align:center; font-size:12px; color:var(--gray-text); font-weight:600; margin:12px 0; }
  .finalcta-stats-row { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:18px; }
  .stat-pill { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700; color:var(--dark-text); }
  .stat-pill .icon { font-size:18px; color:var(--coral-text); }
  .stat-divider { width:1px; height:22px; background:var(--gray-light); }
  .discount-banner { background:#FFF6E0; border-radius:var(--border-radius); padding:18px; display:flex; gap:14px; align-items:flex-start; margin-bottom:20px; }
  .discount-banner .banner-icon { font-size:32px; flex-shrink:0; }
  .discount-banner p { font-size:15px; line-height:1.5; color:var(--dark-text); font-weight:500; }
  .discount-banner p strong { color:var(--coral-text); }
  .plan-subpill { display:inline-block; background:var(--gray-light); color:var(--gray-text); font-size:11px; font-weight:700; padding:3px 10px; border-radius:6px; margin:4px 0 6px; }
  .plan-price-old strong { color:var(--dark-text); text-decoration:none; }

  .mockup-phone { flex:1; aspect-ratio:9/16; background:var(--gray-light); border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; font-size:32px; position:relative; }
  .mockup-label { font-size:11px; font-weight:700; color:var(--gray-text); }
  .coach-bubble { background:#EFE9FF; border-radius:14px; padding:14px; display:flex; gap:10px; align-items:flex-start; margin-bottom:16px; }
  .coach-bubble p { font-size:13px; line-height:1.5; color:#4A2E8A; }
  .coach-avatar { font-size:20px; flex-shrink:0; }

  #devNav { position:sticky; bottom:0; left:0; right:0; background:#1A1A1A; color:#fff; padding:10px 14px; display:flex; align-items:center; gap:8px; font-size:12px; z-index:200; }

  #devCounter { font-size:11px; color:#aaa; white-space:nowrap; }
</style>

let currentIndex=0, answers={}, unitState={}, numericValues={}, selectedPlan="monthly";
const app=document.getElementById("app");

async function loadProfile(){try{if(!window.storage)return;const r=await window.storage.get("bodyflow_profile");if(r&&r.value){const p=JSON.parse(r.value);answers=p.answers||{};numericValues=p.numericValues||{};unitState=p.unitState||{};currentIndex=p.currentIndex||0;}}catch(e){}}
async function saveProfile(){try{if(!window.storage)return;await window.storage.set("bodyflow_profile",JSON.stringify({answers,numericValues,unitState,currentIndex,updatedAt:new Date().toISOString()}));}catch(e){}}

function getHeightCm(){const h=numericValues.height??0;return unitState.height==="ft"?Math.round(h*30.48):h;}
function getWeightKg(f){const w=numericValues[f]??0;return unitState[f]==="lb"?Math.round(w*0.4536):w;}
function calcBMI(){const h=getHeightCm()/100,w=getWeightKg("weight");if(!h||!w)return 0;return Math.round((w/(h*h))*10)/10;}
function bmiCategory(b){if(!b)return"sin datos";if(b<18.5)return"bajo peso";if(b<25)return"normal";if(b<30)return"sobrepeso";return"obesidad";}
function bmiSliderPct(b){if(!b)return 0;if(b<=25)return Math.max(0,((b-15)/(25-15))*35);if(b<=30)return 35+((b-25)/(30-25))*30;return Math.min(100,65+((b-30)/(40-30))*35);}

function currentBlockIndex(s){return(s.block>=1&&s.block<=4)?s.block:0;}
function goNext(){if(currentIndex<SCREENS.length-1){currentIndex++;saveProfile();render();window.scrollTo(0,0);}else{completeOnboarding();}}
function goPrev(){if(currentIndex>0){currentIndex--;saveProfile();render();window.scrollTo(0,0);}}
function goTo(i){currentIndex=Math.max(0,Math.min(SCREENS.length,i));saveProfile();render();window.scrollTo(0,0);}
function setAnswer(f,v){answers[f]=v;saveProfile();}
function toggleMultiAnswer(f,k){if(!Array.isArray(answers[f]))answers[f]=[];const i=answers[f].indexOf(k);if(i>=0)answers[f].splice(i,1);else answers[f].push(k);saveProfile();}
function selectSingle(f,k){setAnswer(f,k);}
function selectPlan(k){selectedPlan=k;trackPlanSelect(k);render();}

function renderTopbar(s){
  if(s.type==="hero")return"";
  const b=currentBlockIndex(s);
  let dots="";
  for(let i=1;i<=4;i++){const filled=i<=b,cur=i===b;dots+=`<div class="progress-bar" style="flex:1;${i>1?"margin-left:4px;":""}"><div class="progress-fill" style="width:${filled?"100%":"0%"};${cur?"background:var(--coral)":""}"></div></div>`;}
  return`<div class="topbar"><button class="back-btn" onclick="goPrev()" ${currentIndex===0?"disabled":""}>&#8592;</button><div class="logo"><div class="logo-mark"></div> BodyFlow</div><div class="progress-track">${dots}</div></div>`;
}
function iconSpan(e){return`<span class="opt-icon">${e}</span>`;}

  const btn=document.querySelector(".footer-cta .btn-primary");
  if(btn&&s.field===field)btn.disabled=!v||v===0;
  if(field==="weight"&&s.feedback&&s.feedback.dynamic==="bmi"){const el=document.querySelector(".feedback-card strong");if(el){const bmi=calcBMI();const cat=bmiCategory(bmi);el.textContent=s.feedback.icon+" "+s.feedback.titleTemplate.replace("{bmi}",bmi||"--").replace("{bmiCategory}",cat);}}
}
function commitNumericValue(field,raw){
  const s=SCREENS.find(x=>x.field===field&&x.type==="numeric");
  const mn=s.min??-Infinity,mx=s.max??Infinity;
  let v=parseFloat(raw);if(isNaN(v))v=0;
  numericValues[field]=Math.round(Math.max(mn,Math.min(mx,v))*10)/10;render();
}
function stepNumeric(field,dir){
  const s=SCREENS.find(x=>x.field===field&&x.type==="numeric");
  const step=s.step||1,mn=s.min??-Infinity,mx=s.max??Infinity;
  let v=(numericValues[field]??s.defaultValue??0)+dir*step;
  numericValues[field]=Math.round(Math.max(mn,Math.min(mx,v))*10)/10;render();
}
function setUnit(field,unit){
  const old=unitState[field]||unit,v=numericValues[field]??0;
  if(old!==unit){
    if(unit==="lb"&&old==="kg")numericValues[field]=Math.round(v/0.4536);
    if(unit==="kg"&&old==="lb")numericValues[field]=Math.round(v*0.4536);
    if(unit==="ft"&&old==="cm")numericValues[field]=Math.round(v/30.48*10)/10;
    if(unit==="cm"&&old==="ft")numericValues[field]=Math.round(v*30.48);
  }
  unitState[field]=unit;render();
}
function refreshFooter(){
  const eb=document.getElementById("emailContinue"),ei=document.getElementById("emailInput");
  if(eb&&ei)eb.disabled=!/\S+@\S+\.\S+/.test(ei.value);
  const db=document.getElementById("dateContinue"),di=document.getElementById("dateInput");
  if(db&&di)db.disabled=!di.value;
}
async function completeOnboarding(){setAnswer("selectedPlan",selectedPlan);setAnswer("completedAt",new Date().toISOString());await saveProfile();trackComplete();currentIndex=SCREENS.length;render();window.scrollTo(0,0);}
async function goToCheckout(){
  const s=SCREENS.find(x=>x.type==="finalCta");
  const plan=s&&s.plans?s.plans.find(p=>p.key===selectedPlan):null;
  setAnswer("selectedPlan",selectedPlan);setAnswer("completedAt",new Date().toISOString());
  await saveProfile();
  trackComplete();
  if(plan&&plan.checkoutUrl){
    if(isDevMode()){window.open(plan.checkoutUrl,"_blank");}
    else{window.location.href=plan.checkoutUrl;}
  }
  else{currentIndex=SCREENS.length;render();window.scrollTo(0,0);}
}

// ============================================================
// META PIXEL TRACKING
// ============================================================
function fbqSafe(cmd,name,params){try{if(typeof fbq==="function")fbq(cmd,name,params||{});}catch(e){}}
function trackScreen(s,idx){
  const screenName=`${idx+1}_${s.type}${s.field?'_'+s.field:''}`;
  fbqSafe('trackCustom','OnboardingStep',{step_index:idx+1,step_type:s.type,step_field:s.field||null,screen_name:screenName,total_steps:SCREENS.length});
  // Eventos estándar en hitos clave del funnel
  if(s.type==="hero")fbqSafe('track','ViewContent',{content_name:'onboarding_start'});
  if(s.type==="email")fbqSafe('track','Lead',{content_name:'email_step'});
  if(s.type==="finalCta")fbqSafe('track','InitiateCheckout',{content_name:'final_cta',value:0,currency:'USD'});
}
function trackComplete(){
  fbqSafe('track','CompleteRegistration',{content_name:'onboarding_complete',status:true});
  fbqSafe('track','Purchase',{content_name:'plan_selected',content_ids:[selectedPlan],value:0,currency:'USD'});
}
function trackPlanSelect(k){fbqSafe('trackCustom','PlanSelected',{plan:k});}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  if(currentIndex>=SCREENS.length){app.innerHTML=`<div class="screen">${renderComplete()}</div>`;updateDevNav();return;}
  const s=SCREENS[currentIndex];
  trackScreen(s,currentIndex);
  let body="";
  switch(s.type){
    case"hero": body=renderHero(); break;
    case"gender": body=renderGender(s); break;
    case"stat": body=renderStat(s); break;
    case"multi": body=renderMulti(s); break;
    case"single": body=renderSingle(s); break;
    case"reframe": body=renderReframe(s); break;
    case"numeric": body=renderNumeric(s); break;
    case"date": body=renderDate(s); break;
    case"bmiSummary": body=renderBmiSummary(s); break;
    case"projection": body=renderProjection(s); break;
    case"analyzing": body=renderAnalyzing(s); break;
    case"microModal": body=renderMicroModal(s); break;
    case"email": body=renderEmail(s); break;
    case"optin": body=renderOptin(s); break;
    case"planReady": body=renderPlanReady(s); break;
    case"challenge": body=renderChallenge(s); break;
    case"motivation": body=renderMotivation(s); break;
    case"mockups": body=renderMockups(s); break;
    case"trustBadges": body=renderTrustBadges(s); break;
    case"testimonials": body=renderTestimonials(s); break;
    case"beforeAfter": body=renderBeforeAfter(s); break;
    case"finalCta": body=renderFinalCta(s); break;
    default: body=`<div class="content">Tipo desconocido: ${s.type}</div>`;
  }
  app.innerHTML=`<div class="screen">${renderTopbar(s)}${body}</div>`;
  if(s.type==="hero") setTimeout(initHeroAnimation,50);
  updateDevNav();
}

function setupDevNav(){
  if(!isDevMode()){const nav=document.getElementById("devNav");if(nav)nav.style.display="none";return;}
  const j=document.getElementById("devJump");
  j.innerHTML=SCREENS.map((s,i)=>`<option value="${i}">${i+1}. ${s.type}</option>`).join("")+`<option value="${SCREENS.length}">Completo</option>`;
  document.getElementById("devPrev").onclick=goPrev;
  document.getElementById("devNext").onclick=()=>{if(currentIndex<SCREENS.length)goNext();};
  j.onchange=e=>goTo(parseInt(e.target.value,10));
}
function updateDevNav(){
  if(!isDevMode())return;
  const j=document.getElementById("devJump"),c=document.getElementById("devCounter");
  if(j)j.value=Math.min(currentIndex,SCREENS.length);
  if(c)c.textContent=`${Math.min(currentIndex+1,SCREENS.length+1)} / ${SCREENS.length+1}`;
}

(async function init(){await loadProfile();setupDevNav();render();})();
</script>
